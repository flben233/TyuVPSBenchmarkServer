name: Souin Caddy

on:
  push:
    branches: ["master"]
    paths:
      - 'web/lolicon-vps/**'
      - '.github/workflows/frontend.yml'
      - '.github/workflows/souin.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SCOPE: lolicon-vps

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push souin caddy
        uses: docker/build-push-action@v6
        with:
          context: ./web/lolicon-vps
          file: ./web/lolicon-vps/Dockerfile.souin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.SCOPE }}/souin:latest
