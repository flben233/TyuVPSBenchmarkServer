name: Python LLM

on:
  push:
    branches: ["master"]
    paths:
      - "llm/**/*.py"
      - "llm/requirements*.txt"
      - "llm/pyproject.toml"
      - "Dockerfile.llm"
      - ".github/workflows/python-llm.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "llm/**/*.py"
      - "llm/requirements*.txt"
      - "llm/pyproject.toml"
      - "Dockerfile.llm"
      - ".github/workflows/python-llm.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SCOPE: lolicon-vps

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./llm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('llm/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest redis openai langchain-core langgraph langchain-mcp-adapters pydantic

  build:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push LLM backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.llm
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.SCOPE }}/llm:latest
